<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Hunt - Forêt & Canard de Bain</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', monospace;
            /* Empêche de surligner le texte en cliquant vite */
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #4A90E2, #87CEEB);
            overflow: hidden;
            border: 4px solid #fff;
            cursor: crosshair;
            /* Empêche les comportements tactiles par défaut (zoom, scroll) */
            touch-action: none; 
        }

        /* Décor de forêt */
        #forest {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            /* CRUCIAL : Empêche la forêt d'intercepter les clics */
            pointer-events: none; 
        }

        /* Force aussi les enfants SVG à ignorer les clics */
        #forest svg {
            position: absolute;
            pointer-events: none;
        }

        #grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background-color: #2E7D32;
            z-index: 10;
            border-top: 10px solid #1B5E20;
            pointer-events: none;
