<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Hunt - Canard de Bain</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', monospace;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #64B0FF;
            overflow: hidden;
            border: 4px solid #fff;
            cursor: crosshair;
        }

        #grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background-color: #00A800;
            z-index: 10;
            border-top: 10px solid #005800;
        }

        #duck {
            position: absolute;
            z-index: 5;
            display: none;
            transition: transform 0.1s;
        }

        #ui-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background-color: #000;
            z-index: 20;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: #58D854;
        }

        .ui-box {
            border: 2px solid #58D854;
            padding: 10px;
            text-align: center;
        }

        #ammo-container, #score-container, #round-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 30;
            display: none;
            pointer-events: none;
        }

        #message {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 20px 0;
            z-index: 15;
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="flash"></div>
        <div id="message">FLY AWAY</div>
        <div id="duck"></div>
        <div id="grass"></div>
        
        <div id="ui-panel">
            <div id="round-container" class="ui-box">
                <span>R= <span id="round">1</span></span>
            </div>
            <div id="ammo-container" class="ui-box">
                <span>SHOTS</span>
                <span id="ammo">|||</span>
            </div>
            <div id="score-container" class="ui-box">
                <span>SCORE</span>
                <span id="score">000000</span>
            </div>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const duckElement = document.getElementById('duck');
        const ammoDisplay = document.getElementById('ammo');
        const scoreDisplay = document.getElementById('score');
        const roundDisplay = document.getElementById('round');
        const flashElement = document.getElementById('flash');
        const messageDisplay = document.getElementById('message');

        // Dessin vectoriel du canard jaune style bain
        const duckSVG = `
        <svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M 80,45 Q 95,35 90,55" fill="#FFD700" />
            <path d="M 30,50 Q 30,85 60,85 L 75,85 Q 95,85 90,55 Q 85,45 60,45 Z" fill="#FFD700" />
            <circle cx="45" cy="35" r="20" fill="#FFD700" />
            <circle cx="36" cy="30" r="3.5" fill="black" />
            <circle cx="35" cy="29" r="1.5" fill="white" />
            <path d="M 10,35 Q 25,32 28,40 Q 25,45 10,42 Z" fill="#FF9900" />
            <path d="M 55,55 Q 75,55 75,65 Q 55,70 55,55 Z" fill="#ECA400" />
        </svg>`;
        
        const explosionHTML = '<div style="font-size: 50px; line-height: 1;">💥</div>';

        // Variables d'état du jeu
        let ammo = 3;
        let score = 0;
        let round = 1;
        let ducksPerRound = 10;
        let ducksSpawned = 0;
        
        // Variables du canard
        let duckAlive = false;
        let duckX = 0;
        let duckY = 0;
        let duckVx = 0;
        let duckVy = 0;
        let animationFrameId;
        let escapeTimer;

        function startGame() {
            score = 0;
            round = 1;
            updateUI();
            startRound();
        }

        function startRound() {
            ducksSpawned = 0;
            updateUI();
            setTimeout(spawnDuck, 1000);
        }

        function spawnDuck() {
            if (ducksSpawned >= ducksPerRound) {
                round++;
                startRound();
                return;
            }

            ducksSpawned++;
            ammo = 3;
            updateUI();

            duckAlive = true;
            duckElement.style.display = 'block';
            duckElement.style.transform = 'scaleX(1) scaleY(1)';
            duckElement.innerHTML = duckSVG; // On injecte le canard de bain

            duckX = Math.random() * (gameContainer.clientWidth - 100) + 50;
            duckY = gameContainer.clientHeight - 150; 
            
            let baseSpeed = 2 + (round * 0.5);
            duckVx = (Math.random() > 0.5 ? 1 : -1) * baseSpeed;
            duckVy = -baseSpeed - Math.random() * 2;

            let escapeTime = Math.max(3000, 7000 - (round * 500));
            clearTimeout(escapeTimer);
            escapeTimer = setTimeout(duckEscapes, escapeTime);

            gameLoop();
        }

        function gameLoop() {
            if (!duckAlive) return;

            duckX += duckVx;
            duckY += duckVy;

            if (duckX <= 0 || duckX >= gameContainer.clientWidth - 60) {
                duckVx *= -1;
            }
            if (duckY <= 0) {
                duckVy *= -1;
            }
            if (duckY >= gameContainer.clientHeight - 200 && duckVy > 0) {
                duckVy *= -1;
            }

            // Orientation du canard
            if (duckVx > 0) {
                duckElement.style.transform = 'scaleX(-1)'; 
            } else {
                duckElement.style.transform = 'scaleX(1)';
            }

            duckElement.style.left = duckX + 'px';
            duckElement.style.top = duckY + 'px';

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        gameContainer.addEventListener('mousedown', function(e) {
            if (ammo <= 0 || !duckAlive) return;

            ammo--;
            updateUI();
            flashScreen();

            const gameRect = gameContainer.getBoundingClientRect();
            const clickX = e.clientX - gameRect.left;
            const clickY = e.clientY - gameRect.top;

            // Hitbox ajustée pour la taille du SVG
            if (clickX >= duckX - 10 && clickX <= duckX + 70 &&
                clickY >= duckY - 10 && clickY <= duckY + 70) {
                duckHit();
            } else if (ammo === 0 && duckAlive) {
                clearTimeout(escapeTimer);
                duckEscapes();
            }
        });

        function flashScreen() {
            flashElement.style.display = 'block';
            setTimeout(() => { flashElement.style.display = 'none'; }, 50);
        }

        function duckHit() {
            duckAlive = false;
            clearTimeout(escapeTimer);
            cancelAnimationFrame(animationFrameId);

            score += 500 * round;
            updateUI();

            // Remplacer le SVG par l'explosion
            duckElement.innerHTML = explosionHTML;
            
            setTimeout(() => {
                duckElement.innerHTML = duckSVG; // Remettre le canard
                duckElement.style.transform += ' scaleY(-1)'; // Le retourner
                fallDown();
            }, 300);
        }

        function fallDown() {
            duckY += 8;
            duckElement.style.top = duckY + 'px';

            if (duckY < gameContainer.clientHeight) {
                requestAnimationFrame(fallDown);
            } else {
                duckElement.style.display = 'none';
                setTimeout(spawnDuck, 1000);
            }
        }

        function duckEscapes() {
            duckAlive = false;
            cancelAnimationFrame(animationFrameId);
            
            messageDisplay.innerText = "FLY AWAY";
            messageDisplay.style.display = "block";
            
            flyAway();
        }

        function flyAway() {
            duckY -= 5;
            duckElement.style.top = duckY + 'px';

            if (duckY > -100) {
                requestAnimationFrame(flyAway);
            } else {
                duckElement.style.display = 'none';
                setTimeout(() => {
                    messageDisplay.style.display = "none";
                    spawnDuck();
                }, 1500);
            }
        }

        function updateUI() {
            let ammoStr = '';
            for(let i=0; i<ammo; i++) ammoStr += '|';
            ammoDisplay.innerText = ammoStr.padEnd(3, ' ');

            scoreDisplay.innerText = score.toString().padStart(6, '0');
            roundDisplay.innerText = round;
        }

        startGame();

    </script>
</body>
</html>
