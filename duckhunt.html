<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Duck Hunt</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#222;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family: 'Courier New', monospace;
    overflow:hidden;
  }
  #gameContainer {
    position:relative;
    border:8px solid #4a2c17;
    border-radius:6px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
    cursor:none;
  }
  canvas { display:block; background:#5ec8f0; }
  #hud {
    position:absolute;
    top:0; left:0;
    width:100%;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    color:#fff2c2;
    font-size:20px;
    text-shadow:2px 2px 0 #000;
    pointer-events:none;
    letter-spacing:1px;
  }
  #message {
    position:absolute;
    top:45%; left:50%;
    transform:translate(-50%,-50%);
    color:#fff;
    font-size:42px;
    text-shadow:3px 3px 0 #000;
    text-align:center;
    pointer-events:none;
    display:none;
  }
  #startScreen {
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.75);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#fff;
    text-align:center;
    z-index:10;
  }
  #startScreen h1 {
    font-size:48px;
    color:#ffd700;
    text-shadow:3px 3px 0 #7a0000;
    margin-bottom:20px;
  }
  #startScreen p { margin:6px 0; font-size:16px; }
  #startBtn {
    margin-top:20px;
    padding:12px 30px;
    font-size:20px;
    font-family:inherit;
    background:#c0392b;
    color:#fff;
    border:3px solid #7a1f1f;
    border-radius:4px;
    cursor:pointer;
  }
  #startBtn:hover { background:#e74c3c; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="game" width="800" height="600"></canvas>
  <div id="hud">
    <div id="scoreDisplay">SCORE: 0</div>
    <div id="roundDisplay">ROUND: 1</div>
    <div id="ammoDisplay">🔴🔴🔴</div>
  </div>
  <div id="message"></div>
  <div id="startScreen">
    <h1>🦆 DUCK HUNT 🦆</h1>
    <p>Clique pour tirer sur les canards avant qu'ils ne s'échappent !</p>
    <p>3 balles par canard • Ne rate pas trop souvent ou le chien se moquera de toi</p>
    <p>Utilise ta souris comme viseur</p>
    <button id="startBtn">JOUER</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreDisplay = document.getElementById('scoreDisplay');
const roundDisplay = document.getElementById('roundDisplay');
const ammoDisplay = document.getElementById('ammoDisplay');
const messageEl = document.getElementById('message');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');

let mouseX = W/2, mouseY = H/2;
let score = 0;
let round = 1;
let ammo = 3;
let ducksToSpawnThisRound = 3;
let ducksLeftToSpawn = 3;
let ducksKilledThisRound = 0;
let ducksEscapedThisRound = 0;
let missesInRound = 0;
let gameState = 'waiting'; // waiting, playing, dogshow, roundend, gameover
let ducks = [];
let clouds = [];
let dog = null;
let flashTimer = 0;
let shots = []; // muzzle flash markers

// ---------- Utility ----------
function rand(min, max) { return Math.random() * (max - min) + min; }

// ---------- Clouds ----------
function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: rand(0, W),
      y: rand(30, 150),
      speed: rand(0.1, 0.3),
      scale: rand(0.6, 1.3)
    });
  }
}

function drawCloud(c) {
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(c.scale, c.scale);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(0, 0, 20, 0, Math.PI*2);
  ctx.arc(22, -8, 16, 0, Math.PI*2);
  ctx.arc(40, 0, 20, 0, Math.PI*2);
  ctx.arc(20, 8, 18, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function updateClouds() {
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + 60) c.x = -60;
  });
}

// ---------- Background ----------
function drawBackground() {
  // flat sky (ton plus saturé, façon écran de jeu de tir rétro)
  ctx.fillStyle = '#4f80e0';
  ctx.fillRect(0,0,W,H);

  clouds.forEach(drawCloud);

  const bushY = H*0.62;

  // pelouse de fond
  ctx.fillStyle = '#5fae44';
  ctx.fillRect(0, bushY, W, H - bushY);

  // haie sombre en dents rondes le long de l'horizon
  ctx.fillStyle = '#2f6b2f';
  for (let i = -22; i < W + 22; i += 44) {
    ctx.beginPath();
    ctx.arc(i + 22, bushY, 24, Math.PI, 2*Math.PI);
    ctx.fill();
  }
  // touffes de buisson un peu plus foncées qui débordent
  ctx.fillStyle = '#357a35';
  for (let i = 0; i < W; i += 88) {
    ctx.beginPath();
    ctx.arc(i + 44, bushY + 4, 16, 0, Math.PI*2);
    ctx.fill();
  }

  // bandes de pelouse tondue au premier plan
  const stripeStart = bushY + 34;
  const stripeH = 22;
  for (let y = stripeStart, i = 0; y < H; y += stripeH, i++) {
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.06)' : 'rgba(0,40,0,0.10)';
    ctx.fillRect(0, y, W, stripeH);
  }
}

// ---------- Duck ----------
const DUCK_COLORS = [
  {body:'#3a3a3a', wing:'#1e1e1e', belly:'#666'},   // black duck
  {body:'#5b3a29', wing:'#3b2216', belly:'#8a6b4f'}, // brown duck
  {body:'#3a6ea5', wing:'#254a72', belly:'#7ea9d1'}  // blue duck
];

function spawnDuck() {
  const colorSet = DUCK_COLORS[Math.floor(rand(0, DUCK_COLORS.length))];
  const fromLeft = Math.random() < 0.5;
  const baseSpeed = 1.6 + round * 0.25;
  const duck = {
    x: fromLeft ? -40 : W + 40,
    y: rand(H*0.35, H*0.65),
    vx: (fromLeft ? 1 : -1) * rand(baseSpeed, baseSpeed + 1),
    vy: rand(-0.6, 0.6),
    dir: fromLeft ? 1 : -1,
    color: colorSet,
    state: 'flying', // flying, hit, falling, escaping
    wingPhase: Math.random()*Math.PI*2,
    alive: true,
    fallVy: 0,
    bounces: 0,
    turnTimer: rand(60, 140),
    scoreVal: 10 * round,
    id: Math.random()
  };
  ducks.push(duck);
}

function updateDuck(d) {
  if (d.state === 'flying') {
    d.turnTimer--;
    if (d.turnTimer <= 0) {
      d.vy = rand(-1.2, 1.2);
      d.turnTimer = rand(60, 140);
      // occasional direction flap
      if (Math.random() < 0.3) {
        d.vx *= -1;
        d.dir *= -1;
      }
    }
    d.x += d.vx;
    d.y += d.vy;
    d.wingPhase += 0.35;

    if (d.y < H*0.12) d.vy = Math.abs(d.vy);
    if (d.y > H*0.68) d.vy = -Math.abs(d.vy);

    if (d.x < -60 || d.x > W + 60) {
      d.alive = false;
      ducksEscapedThisRound++;
      sfxEscape();
    }
  } else if (d.state === 'hit') {
    // brief stun pose before falling
    d.hitTimer -= 1;
    if (d.hitTimer <= 0) {
      d.state = 'falling';
      d.fallVy = 1;
    }
  } else if (d.state === 'falling') {
    d.fallVy += 0.5;
    d.y += d.fallVy;
    d.x += d.vx * 0.15;
    if (d.y >= H*0.78) {
      d.y = H*0.78;
      if (d.bounces < 1 && Math.abs(d.fallVy) > 2.2) {
        // petit rebond caractéristique
        d.fallVy = -d.fallVy * 0.38;
        d.bounces++;
        sfxBounce();
      } else {
        d.alive = false;
        ducksKilledThisRound++;
        score += d.scoreVal;
        scoreDisplay.textContent = 'SCORE: ' + score;
      }
    }
  }
}

function drawDuck(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  const facing = d.dir;
  ctx.scale(facing, 1);

  if (d.state === 'falling') {
    ctx.rotate(0.3);
  }

  const wingFlap = Math.sin(d.wingPhase) * 18;

  // body
  ctx.fillStyle = d.color.body;
  ctx.beginPath();
  ctx.ellipse(0, 0, 22, 14, 0, 0, Math.PI*2);
  ctx.fill();

  // head
  ctx.beginPath();
  ctx.ellipse(18, -8, 10, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // beak
  ctx.fillStyle = '#e8a021';
  ctx.beginPath();
  ctx.moveTo(26, -8);
  ctx.lineTo(38, -6);
  ctx.lineTo(26, -3);
  ctx.fill();

  // eye
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(21, -10, 1.6, 0, Math.PI*2);
  ctx.fill();

  // belly
  ctx.fillStyle = d.color.belly;
  ctx.beginPath();
  ctx.ellipse(-4, 5, 12, 7, 0, 0, Math.PI*2);
  ctx.fill();

  // wing (animated unless falling)
  ctx.fillStyle = d.color.wing;
  ctx.beginPath();
  if (d.state === 'flying') {
    ctx.ellipse(-4, wingFlap*0.15, 16, 8 + Math.abs(wingFlap)*0.3, -0.3, 0, Math.PI*2);
  } else {
    ctx.ellipse(-4, 10, 16, 7, 0.5, 0, Math.PI*2);
  }
  ctx.fill();

  // tail
  ctx.fillStyle = d.color.wing;
  ctx.beginPath();
  ctx.moveTo(-22, -2);
  ctx.lineTo(-34, -8);
  ctx.lineTo(-30, 2);
  ctx.fill();

  ctx.restore();

  // hit flash stars
  if (d.state === 'hit') {
    ctx.fillStyle = '#fff';
    ctx.font = '20px sans-serif';
    ctx.fillText('✦', d.x - 30, d.y - 20);
    ctx.fillText('✦', d.x + 20, d.y - 25);
  }
}

// ---------- Dog ----------
let pendingDogCallback = null;
let dogResultText = '';

function drawHeldDuck() {
  ctx.fillStyle = '#5b3a29';
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 9, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10, -5, 7, 6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#e8a021';
  ctx.beginPath();
  ctx.moveTo(16, -5); ctx.lineTo(24, -3); ctx.lineTo(16, -1);
  ctx.fill();
  ctx.fillStyle = '#3b2216';
  ctx.beginPath();
  ctx.ellipse(-8, 3, 6, 5, 0, 0, Math.PI*2);
  ctx.fill();
}

// chien de profil qui court (arrivée / sortie)
function drawDogRunning(phase) {
  const legSwing = Math.sin(phase) * 9;
  const bob = Math.abs(Math.sin(phase)) * -3;
  ctx.save();
  ctx.translate(0, bob);

  // pattes arrière
  ctx.fillStyle = '#9c6b38';
  ctx.fillRect(-20 + legSwing, 4, 8, 15);
  ctx.fillRect(-6 - legSwing, 4, 8, 15);
  // pattes avant
  ctx.fillRect(14 + legSwing, 4, 8, 15);
  ctx.fillRect(24 - legSwing, 4, 8, 15);

  // queue
  ctx.strokeStyle = '#8a5a30';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-28, -12);
  ctx.quadraticCurveTo(-44, -22 + Math.sin(phase*2)*5, -36, -32);
  ctx.stroke();

  // corps
  ctx.fillStyle = '#c8945a';
  ctx.beginPath();
  ctx.ellipse(0, -10, 32, 16, 0, 0, Math.PI*2);
  ctx.fill();

  // tache blanche sur le poitrail
  ctx.fillStyle = '#eee3cf';
  ctx.beginPath();
  ctx.ellipse(-6, -2, 14, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // tête
  ctx.fillStyle = '#c8945a';
  ctx.beginPath();
  ctx.ellipse(32, -20, 15, 13, 0, 0, Math.PI*2);
  ctx.fill();

  // oreille tombante
  ctx.fillStyle = '#8a5a30';
  ctx.beginPath();
  ctx.ellipse(28, -10, 8, 16, 0.35, 0, Math.PI*2);
  ctx.fill();

  // museau
  ctx.fillStyle = '#eee3cf';
  ctx.beginPath();
  ctx.ellipse(44, -16, 8, 7, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(51, -16, 2.6, 0, Math.PI*2);
  ctx.fill();

  // oeil
  ctx.beginPath();
  ctx.arc(36, -24, 2, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// pose victoire : le chien tient un ou deux canards bien haut, face au joueur
function drawDogHolding(phase, duckCount) {
  const bounce = Math.sin(phase*3) * 3;
  ctx.save();
  ctx.translate(0, bounce);

  // pattes arrière (debout)
  ctx.fillStyle = '#9c6b38';
  ctx.fillRect(-15, 8, 10, 16);
  ctx.fillRect(5, 8, 10, 16);

  // corps
  ctx.fillStyle = '#c8945a';
  ctx.beginPath();
  ctx.ellipse(0, -8, 20, 26, 0, 0, Math.PI*2);
  ctx.fill();

  // tache blanche poitrine
  ctx.fillStyle = '#eee3cf';
  ctx.beginPath();
  ctx.ellipse(0, 2, 10, 14, 0, 0, Math.PI*2);
  ctx.fill();

  // pattes avant levées tenant les canards
  ctx.strokeStyle = '#c8945a';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  if (duckCount >= 2) {
    ctx.beginPath(); ctx.moveTo(-13, -18); ctx.lineTo(-22, -56); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13, -18); ctx.lineTo(22, -56); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-13, -18); ctx.lineTo(-9, -58); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13, -18); ctx.lineTo(9, -58); ctx.stroke();
  }

  // tête
  ctx.fillStyle = '#c8945a';
  ctx.beginPath();
  ctx.ellipse(0, -44, 16, 15, 0, 0, Math.PI*2);
  ctx.fill();

  // oreilles tombantes
  ctx.fillStyle = '#8a5a30';
  ctx.beginPath(); ctx.ellipse(-14, -38, 7, 16, -0.25, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14, -38, 7, 16, 0.25, 0, Math.PI*2); ctx.fill();

  // museau
  ctx.fillStyle = '#eee3cf';
  ctx.beginPath();
  ctx.ellipse(0, -36, 8, 7, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(0, -34, 2.4, 0, Math.PI*2);
  ctx.fill();

  // yeux joyeux fermés
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-6, -46, 3, Math.PI, 0); ctx.stroke();
  ctx.beginPath(); ctx.arc(6, -46, 3, Math.PI, 0); ctx.stroke();

  // canard(s) tenu(s) au-dessus de la tête
  if (duckCount >= 2) {
    ctx.save();
    ctx.translate(-20, -68 + Math.sin(phase*3)*2);
    ctx.scale(0.85, 0.85);
    drawHeldDuck();
    ctx.restore();
    ctx.save();
    ctx.translate(20, -68 + Math.sin(phase*3 + 1)*2);
    ctx.scale(-0.85, 0.85);
    drawHeldDuck();
    ctx.restore();
  } else {
    ctx.save();
    ctx.translate(0, -70 + Math.sin(phase*3)*2);
    drawHeldDuck();
    ctx.restore();
  }

  ctx.restore();
}

// pose moquerie : le chien se roule de rire
function drawDogLaughing(phase) {
  const shake = Math.sin(phase*4) * 5;
  ctx.save();
  ctx.rotate(shake * 0.015);

  // pattes en l'air
  ctx.fillStyle = '#9c6b38';
  ctx.fillRect(-32, -6 + shake*0.3, 10, 8);
  ctx.fillRect(22, -6 - shake*0.3, 10, 8);

  // corps allongé sur le dos
  ctx.fillStyle = '#c8945a';
  ctx.beginPath();
  ctx.ellipse(0, 4, 28, 18, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#eee3cf';
  ctx.beginPath();
  ctx.ellipse(0, 8, 14, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // tête renversée en arrière, riant
  ctx.save();
  ctx.translate(4, -18);
  ctx.rotate(-0.35);

  ctx.fillStyle = '#c8945a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 14, 0, 0, Math.PI*2);
  ctx.fill();

  // oreilles
  ctx.fillStyle = '#8a5a30';
  ctx.beginPath(); ctx.ellipse(-14, -6, 6, 13, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(13, -6, 6, 13, 0.4, 0, Math.PI*2); ctx.fill();

  // bouche grande ouverte
  ctx.fillStyle = '#7a2e2e';
  ctx.beginPath();
  ctx.ellipse(3, 6, 9, 10, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(3, 0, 8, 3, 0, 0, Math.PI, false);
  ctx.fill();

  // yeux fermés en accent rieur
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-11, -8); ctx.quadraticCurveTo(-6, -13, -1, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9, -9); ctx.quadraticCurveTo(14, -14, 19, -9); ctx.stroke();

  ctx.restore();
  ctx.restore();
}

function drawDog(d) {
  ctx.save();
  ctx.translate(d.x, H*0.80);
  if (d.state === 'walkIn' || d.state === 'walkOut') {
    drawDogRunning(d.phase);
  } else if (d.state === 'pose') {
    if (d.poseType === 'holding') drawDogHolding(d.phase, d.duckCount || 1);
    else drawDogLaughing(d.phase);
  }
  ctx.restore();
}

function updateDog() {
  if (!dog) return;
  dog.phase += 0.18;
  if (dog.state === 'walkIn') {
    dog.x += 4;
    if (dog.x >= dog.targetX) {
      dog.x = dog.targetX;
      dog.state = 'pose';
      dog.phase = 0;
      dog.poseTimer = 110;
      showMessage(dogResultText, 0);
      if (dog.poseType === 'holding') sfxSuccess(); else sfxFail();
    }
  } else if (dog.state === 'pose') {
    dog.poseTimer--;
    if (dog.poseTimer <= 0) {
      dog.state = 'walkOut';
      hideMessage();
    }
  } else if (dog.state === 'walkOut') {
    dog.x += 4;
    if (dog.x > W + 70) {
      dog = null;
      if (pendingDogCallback) {
        const cb = pendingDogCallback;
        pendingDogCallback = null;
        cb();
      }
    }
  }
}

// ---------- Sound (sons synthétisés doux, sans fichier externe) ----------
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playTone(freq, duration, vol, freqEnd) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t0 + duration);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}

function playSoftNoise(duration, vol, filterFreq) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const bufferSize = Math.floor(audioCtx.sampleRate * duration);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random()*2 - 1) * (1 - i/bufferSize);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = filterFreq;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start(t0);
}

// tir : un "pfft" étouffé plutôt qu'une détonation
function sfxShoot() { playSoftNoise(0.09, 0.07, 900); }
// touché : petit pépiement montant
function sfxHit() { playTone(500, 0.14, 0.08, 850); }
// canard qui s'échappe : petit son descendant discret
function sfxEscape() { playTone(480, 0.22, 0.05, 240); }
// rebond au sol : petit "boop" grave
function sfxBounce() { playTone(220, 0.09, 0.06, 160); }
// début de manche : petit carillon
function sfxRoundStart() {
  playTone(523, 0.14, 0.06);
  setTimeout(() => playTone(659, 0.14, 0.06), 130);
  setTimeout(() => playTone(784, 0.18, 0.06), 260);
}
// manche réussie : petite mélodie douce
function sfxSuccess() {
  playTone(392, 0.12, 0.07);
  setTimeout(() => playTone(523, 0.18, 0.07), 110);
}
// manche ratée : petit son doux et un peu triste, sans agressivité
function sfxFail() { playTone(300, 0.28, 0.05, 180); }


function drawCrosshair() {
  ctx.save();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(mouseX - 16, mouseY);
  ctx.lineTo(mouseX + 16, mouseY);
  ctx.moveTo(mouseX, mouseY - 16);
  ctx.lineTo(mouseX, mouseY + 16);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 10, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawMuzzleFlashes() {
  shots.forEach(s => {
    ctx.save();
    ctx.globalAlpha = s.life / 10;
    ctx.fillStyle = '#fff59d';
    ctx.beginPath();
    ctx.arc(s.x, s.y, 14 * (s.life/10), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    s.life--;
  });
  shots = shots.filter(s => s.life > 0);
}

// ---------- Round / game flow ----------
function showMessage(text, duration) {
  messageEl.textContent = text;
  messageEl.style.display = 'block';
  if (duration) {
    setTimeout(() => { messageEl.style.display = 'none'; }, duration);
  }
}

function hideMessage() { messageEl.style.display = 'none'; }

function startRound() {
  ducksToSpawnThisRound = 3 + Math.floor((round-1)/2);
  ducksLeftToSpawn = ducksToSpawnThisRound;
  ducksKilledThisRound = 0;
  ducksEscapedThisRound = 0;
  missesInRound = 0;
  ammo = 3;
  updateAmmoDisplay();
  roundDisplay.textContent = 'ROUND: ' + round;
  ducks = [];
  gameState = 'playing';
  showMessage('ROUND ' + round, 1200);
  sfxRoundStart();
  setTimeout(() => { if(gameState==='playing') maybeSpawnNext(); }, 1200);
}

function maybeSpawnNext() {
  if (gameState !== 'playing') return;
  if (ducksLeftToSpawn > 0 && ducks.length === 0) {
    ducksLeftToSpawn--;
    ammo = 3;
    updateAmmoDisplay();
    spawnDuck();
  }
}

function updateAmmoDisplay() {
  let s = '';
  for (let i = 0; i < 3; i++) s += (i < ammo) ? '🔴' : '⚫';
  ammoDisplay.textContent = s;
}

function endRoundCheck() {
  if (gameState !== 'playing') return;
  if (ducksLeftToSpawn === 0 && ducks.filter(d=>d.alive).length === 0) {
    gameState = 'dogshow';
    const totalDucks = ducksToSpawnThisRound;
    const killed = ducksKilledThisRound;
    const success = killed >= Math.ceil(totalDucks/2);

    dogResultText = success
      ? ('Round ' + round + ' réussi ! (' + killed + '/' + totalDucks + ')')
      : ('Le chien se moque de toi... (' + killed + '/' + totalDucks + ')');

    dog = {
      x: -50,
      y: 0,
      targetX: W/2,
      state: 'walkIn',
      phase: 0,
      poseType: success ? 'holding' : 'laughing',
      duckCount: Math.min(killed, 2)
    };

    pendingDogCallback = () => {
      hideMessage();
      nextRoundOrEnd();
    };
  }
}

function nextRoundOrEnd() {
  round++;
  if (round > 8) {
    gameState = 'gameover';
    showMessage('PARTIE TERMINÉE ! Score final: ' + score, 999999);
    setTimeout(() => {
      hideMessage();
      startScreen.style.display = 'flex';
      startScreen.querySelector('h1').textContent = 'PARTIE TERMINÉE';
      startScreen.querySelector('p').textContent = 'Score final : ' + score;
    }, 2500);
  } else {
    startRound();
  }
}

// ---------- Input ----------
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);
});

canvas.addEventListener('click', () => {
  if (gameState !== 'playing') return;
  if (ammo <= 0) return;
  ammo--;
  updateAmmoDisplay();
  shots.push({x: mouseX, y: mouseY, life: 10});
  sfxShoot();

  let hitSomething = false;
  for (const d of ducks) {
    if (d.state !== 'flying') continue;
    const dx = mouseX - d.x, dy = mouseY - d.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 30) {
      d.state = 'hit';
      d.hitTimer = 12;
      hitSomething = true;
      sfxHit();
      break;
    }
  }

  if (!hitSomething) {
    missesInRound++;
    if (ammo === 0) {
      // out of ammo, if duck still flying it escapes on next update pass naturally
    }
  }
});

startBtn.addEventListener('click', () => {
  initAudio();
  startScreen.style.display = 'none';
  score = 0;
  round = 1;
  scoreDisplay.textContent = 'SCORE: 0';
  initClouds();
  startRound();
});

// ---------- Main loop ----------
function loop() {
  drawBackground();

  updateClouds();

  ducks.forEach(updateDuck);
  ducks = ducks.filter(d => d.alive);
  ducks.forEach(drawDuck);

  drawMuzzleFlashes();

  if (dog) {
    updateDog();
    if (dog) drawDog(dog);
  }

  if (gameState === 'playing') {
    if (ducks.length === 0 && ducksLeftToSpawn > 0) {
      maybeSpawnNext();
    }
    endRoundCheck();
  }

  drawCrosshair();

  requestAnimationFrame(loop);
}

initClouds();
loop();
</script>
</body>
